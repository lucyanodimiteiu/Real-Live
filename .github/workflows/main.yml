name: Nexta Cloud Radar

on:
  schedule:
    - cron: '*/10 * * * *' # Rulează la fiecare 10 minute
  workflow_dispatch:      # Buton pentru pornire manuală

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install telethon googletrans==4.0.0-rc1

      - name: Run Robot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          NEW_NEXTA_BOT: ${{ secrets.NEW_NEXTA_BOT }}
          NEXTALIVEROMA: ${{ secrets.NEXTALIVEROMA }}
        run: python nexta_cloud_robot.py
