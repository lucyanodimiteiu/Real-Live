name: Automatizare Nexta Live Romania - Audio

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *' # Rulăm la 30 min pentru a lăsa timp scriptului să termine

concurrency:
  group: scraping-nexta
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr tesseract-ocr-ron tesseract-ocr-eng tesseract-ocr-rus tesseract-ocr-heb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon requests pytesseract Pillow pytz

      - name: Run script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          NEXTALIVEROMANIA_ID: ${{ secrets.NEXTALIVEROMANIA_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python nexta_cloud_robot.py

      - name: 💾 Salvare Memorie Permanentă
        run: |
          git config --global user.name "Grigore-Bot"
          git config --global user.email "bot@grigore.ai"
          # Ne asigurăm că fișierele există înainte de a le adăuga
          touch processed_links.txt bot_log.json stiri.db
          git add stiri.db processed_links.txt bot_log.json || true
          git commit -m "Update memorie bot: stop dubluri [skip ci]" || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
