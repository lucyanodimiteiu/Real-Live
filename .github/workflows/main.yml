name: Automatizare Nexta Live Romania - Audio
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

concurrency:
  group: scraping-nexta
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Restore SQLite DB (cache intre rulari)
        uses: actions/cache@v3
        with:
          path: stiri.db
          key: stiri-db-${{ runner.os }}
          restore-keys: stiri-db-

      - name: Restore Log (cache intre rulari)
        uses: actions/cache@v3
        with:
          path: bot_log.json
          key: bot-log-${{ runner.os }}
          restore-keys: bot-log-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr tesseract-ocr-ron tesseract-ocr-eng tesseract-ocr-rus tesseract-ocr-heb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon requests pytesseract Pillow

      - name: Run script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          NEXTALIVEROMANIA_ID: ${{ secrets.NEXTALIVEROMANIA_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python nexta_cloud_robot.py
