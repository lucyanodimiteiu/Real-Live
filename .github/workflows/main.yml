name: Automatizare Nexta Live Romania - Audio

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Rulează la ore fixe: 07:00, 12:00, 17:00, 20:00 UTC
    - cron: '0 7 * * *'
    - cron: '0 12 * * *'
    - cron: '0 17 * * *'
    - cron: '0 20 * * *'   # Ora 20:00 = declanșează rezumatul zilnic Top 5

concurrency:
  group: scraping-nexta
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ==========================================
      # Restaurare baza de date SQLite din cache
      # ==========================================
      - name: Restore SQLite DB from cache
        uses: actions/cache@v3
        with:
          path: stiri.db
          key: stiri-db-${{ github.run_id }}
          restore-keys: |
            stiri-db-

      # ==========================================
      # Restaurare log din cache
      # ==========================================
      - name: Restore log file from cache
        uses: actions/cache@v3
        with:
          path: bot_log.txt
          key: bot-log-${{ github.run_id }}
          restore-keys: |
            bot-log-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg tesseract-ocr tesseract-ocr-ron tesseract-ocr-eng tesseract-ocr-rus tesseract-ocr-heb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon requests pytesseract Pillow

      - name: Run script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          NEXTALIVEROMANIA_ID: ${{ secrets.NEXTALIVEROMANIA_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python nexta_cloud_robot.py

      # ==========================================
      # Afișează ultimele 50 linii din log
      # ==========================================
      - name: Show recent logs
        if: always()
        run: |
          echo "=== ULTIMELE LOG-URI ==="
          tail -n 50 bot_log.txt || echo "Nu există log încă."
