name: 🕒 Get Last Post
on: workflow_dispatch
jobs:
  get_post:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install telethon pytz
      - name: Run Script
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          NEXTALIVEROMANIA_ID: ${{ secrets.NEXTALIVEROMANIA_ID }}
        run: |
          cat << 'PYEOF' > script.py
          import os, asyncio
          from telethon import TelegramClient
          from telethon.sessions import StringSession
          import pytz
          api_id = os.getenv('API_ID')
          api_hash = os.getenv('API_HASH')
          session_string = os.getenv('TELEGRAM_SESSION')
          try:
              canal = int(os.getenv('NEXTALIVEROMANIA_ID'))
          except:
              canal = os.getenv('NEXTALIVEROMANIA_ID')
          async def main():
              client = TelegramClient(StringSession(session_string), int(api_id), api_hash)
              await client.connect()
              try:
                  async for msg in client.iter_messages(canal, limit=1):
                      tz = pytz.timezone('Europe/Bucharest')
                      local_time = msg.date.astimezone(tz)
                      print(f"DATE:{local_time.strftime('%Y-%m-%d %H:%M:%S')}")
                      text = msg.text.replace('\n', ' ') if msg.text else "Fara_Text"
                      print(f"TEXT:{text[:100]}")
              except Exception as e:
                  print(f"ERROR:{e}")
              finally:
                  await client.disconnect()
          asyncio.run(main())
          PYEOF
          python script.py
